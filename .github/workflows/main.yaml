name: Build
on:
  push:
    branches:
      - main
jobs:
  release:
    environment: main
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: 'shell'
          filters: |
            packages:
              - added|modified: 'packages/**'
      - name: Do Changes
        run: |
          echo ${{ steps.filter.outputs.packages }}
          echo ${{ steps.filter.outputs.packages_files }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Set Token
        run: npm set "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}"
      - name: Install dependencies
        run: npm ci
      - name: Release One
        if: steps.filter.outputs.one == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE }}
        run: npm run update:versions -- one
      - name: Release Two
        if: steps.filter.outputs.two == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE }}
        run: npm run update:versions -- two
      - name: Release Three
        if: steps.filter.outputs.three == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE }}
        run: npm run update:versions -- three